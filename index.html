<html><head><base href="." target="_blank">
<meta charset="UTF-8">
<title>OldGrounds Forums - The best of Web 1.0</title>
<style>
  body {
    background: #000000;
    color: #ffffff;
    font-family: Verdana, Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 950px;
    margin: 0 auto;
    background: #1a1a1a;
    border: 1px solid #333;
  }

  .header {
    background: #ff4400;
    padding: 10px;
    text-align: center;
  }

  .logo h1 {
    font-family: Impact, sans-serif;
    font-size: 48px;
    color: #000;
    text-shadow: 2px 2px 0 #fff;
    margin: 0;
  }

  .navigation {
    background: #333;
    border-top: 1px solid #666;
    border-bottom: 1px solid #666;
  }

  .nav-list {
    display: flex;
    list-style: none;
    margin: 0;
    padding: 0;
    justify-content: center;
  }

  .nav-list li {
    padding: 8px 15px;
    border-right: 1px solid #666;
  }

  .nav-list li:last-child {
    border-right: none;
  }

  .nav-list a {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
  }

  .featured {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 15px;
    background: #222;
  }

  .game-card {
    background: #333;
    border: 1px solid #444;
    padding: 10px;
  }

  .game-card h4 {
    color: #ff4400;
    margin: 0 0 10px 0;
  }

  .rating {
    color: #ffcc00;
    font-size: 12px;
  }

  .author {
    color: #999;
    font-size: 11px;
  }

  .play-button {
    background: #ff4400;
    color: white;
    padding: 5px 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
  }

  .play-button:hover {
    background: #ff6600;
  }

  .news-ticker {
    background: #333;
    padding: 5px;
    font-size: 11px;
    color: #999;
  }

  .footer {
    background: #333;
    padding: 10px;
    text-align: center;
    font-size: 11px;
    color: #666;
  }

  .forum-container {
    padding: 15px;
    background: #222;
  }

  .forum-header {
    background: #333;
    padding: 10px;
    margin-bottom: 15px;
  }

  .forum-title {
    color: #ff4400;
    margin: 0;
    font-size: 24px;
  }

  .post-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .forum-post {
    background: #333;
    border: 1px solid #444;
    margin-bottom: 10px;
    padding: 10px;
  }

  .post-header {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    border-bottom: 1px solid #444;
    padding-bottom: 5px;
  }

  .post-avatar {
    width: 50px;
    height: 50px;
    margin-right: 10px;
    background: #444;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #555;
  }

  .post-info {
    flex-grow: 1;
  }

  .post-author {
    color: #ff4400;
    font-weight: bold;
    font-size: 14px;
  }

  .post-date {
    color: #666;
    font-size: 11px;
  }

  .post-content {
    color: #fff;
    font-size: 13px;
    line-height: 1.4;
  }

  .new-post-form {
    background: #333;
    padding: 10px;
    margin-top: 15px;
  }

  .post-textarea {
    width: 100%;
    height: 100px;
    background: #222;
    border: 1px solid #444;
    color: #fff;
    padding: 5px;
    margin-bottom: 10px;
    font-family: Verdana, Arial, sans-serif;
  }

  .submit-post {
    background: #ff4400;
    color: white;
    padding: 5px 15px;
    border: none;
    font-weight: bold;
    cursor: pointer;
  }

  .submit-post:hover {
    background: #ff6600;
  }

  .online-users {
    background: #333;
    padding: 10px;
    margin-bottom: 15px;
    font-size: 12px;
  }

  .online-users-list {
    color: #999;
  }

  .user-tag {
    background: #444;
    padding: 2px 5px;
    margin: 2px;
    display: inline-block;
    border-radius: 3px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <h1>OLDGROUNDS</h1>
    </div>
  </div>

  <div class="navigation">
    <ul class="nav-list">
      <li><span style="cursor:pointer" onclick="switchSection('games')">GAMES</span></li>
      <li><span style="cursor:pointer" onclick="switchSection('movies')">MOVIES</span></li>
      <li><span style="cursor:pointer" onclick="switchSection('audio')">AUDIO</span></li>
      <li><span style="cursor:pointer" onclick="switchSection('art')">ART</span></li>
      <li><span style="cursor:pointer" onclick="switchSection('forums')">FORUMS</span></li>
    </ul>
  </div>

  <div class="forum-container">
    <div class="online-users">
      <strong>Online Users:</strong>
      <div class="online-users-list" id="online-users-list">
        Loading users...
      </div>
    </div>

    <div class="forum-header">
      <h2 class="forum-title">General Discussion</h2>
    </div>

    <ul class="post-list" id="post-list">
      <!-- Posts will be populated here -->
    </ul>

    <div class="new-post-form">
      <textarea class="post-textarea" id="post-content" placeholder="What's on your mind?"></textarea>
      <button class="submit-post" id="submit-post">Post Message</button>
    </div>
  </div>

  <div class="footer">
    ©2007 OldGrounds Inc. | About | Contact | Terms of Use | Privacy Policy
  </div>
</div>

<script>
const room = new WebsimSocket();

function switchSection(section) {
  console.log(`Switching to ${section} section`);
  // Future section handling
}

room.onmessage = (event) => {
  const data = event.data;
  switch (data.type) {
    case "connected":
    case "disconnected":
      updateOnlineUsers();
      break;
    case "forum-post":
      addPostToList(data);
      savePost(data);
      break;
  }
};

room.onPeersChanged = (peers) => {
  updateOnlineUsers();
};

function updateOnlineUsers() {
  const usersList = document.getElementById('online-users-list');
  usersList.innerHTML = '';
  
  Object.entries(room.party.peers).forEach(([clientId, peer]) => {
    const userTag = document.createElement('span');
    userTag.className = 'user-tag';
    userTag.textContent = peer.username;
    usersList.appendChild(userTag);
  });
}

function addPostToList(postData) {
  const postList = document.getElementById('post-list');
  const postElement = document.createElement('li');
  postElement.className = 'forum-post';
  
  postElement.innerHTML = `
    <div class="post-header">
      <div class="post-avatar">
        <img src="${postData.avatarUrl}" width="50" height="50" alt="User avatar">
      </div>
      <div class="post-info">
        <div class="post-author">${postData.username}</div>
        <div class="post-date">${postData.timestamp || new Date().toLocaleString()}</div>
      </div>
    </div>
    <div class="post-content">${postData.content}</div>
  `;
  
  postList.appendChild(postElement);
  postList.scrollTop = postList.scrollHeight;
}

async function savePost(postData) {
  const post = {
    ...postData,
    timestamp: new Date().toLocaleString()
  };

  await room.store.update({
    id: 'forum-posts',
    dependencies: { post },
    updateFunction: (posts = []) => [...posts, post]
  });
}

document.getElementById('submit-post').addEventListener('click', () => {
  const content = document.getElementById('post-content').value.trim();
  if (!content) return;
  
  const postData = {
    type: 'forum-post',
    content: content,
    username: room.party.client.username,
    avatarUrl: room.party.client.avatarUrl,
    timestamp: new Date().toLocaleString()
  };
  
  room.send(postData);
  document.getElementById('post-content').value = '';
});

async function loadExistingPosts() {
  try {
    const posts = await room.store.get('forum-posts') || [];
    posts.forEach(post => addPostToList(post));
  } catch (error) {
    console.error('Error loading posts:', error);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadExistingPosts();
});
</script>

</body></html>
