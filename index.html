  .forum-sections {
    list-style: none;
    padding: 0;

    background: #333;

  .forum-section:hover {

  .forum-section.seen .section-icon img,
  .thread.seen .thread-icon img {
    opacity: 0.5;

  .section-header {
    padding: 10px;

  .section-icon {
    width: 32px;

  .section-content {
    flex-grow: 1;
    display: flex;
    flex-direction: column;

  }

  .section-description {

  .section-stats {
    display: flex;

  .thread {

  }

  .new-thread-form {
    background: #333;

  .thread-title-input {
    width: 100%;
    background: #222;
    border: 1px solid #444;

    padding: 5px;

  .back-button {
    background: #333;
    color: #fff;

<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <h1>OLDGROUNDS</h1>
    </div>
  </div>

  <div class="navigation">
    <ul class="nav-list">
      <li><span style="cursor:pointer" onclick="switchSection('games')">GAMES</span></li>
      <li><span style="cursor:pointer" onclick="switchSection('movies')">MOVIES</span></li>
      <li><span style="cursor:pointer" onclick="switchSection('audio')">AUDIO</span></li>
      <li><span style="cursor:pointer" onclick="switchSection('art')">ART</span></li>
      <li><span style="cursor:pointer" onclick="switchSection('forums')">FORUMS</span></li>
    </ul>
  </div>

  <div class="forum-container">
    <div class="online-users">
      <strong>Online Users:</strong>
      <div class="online-users-list" id="online-users-list">
        Loading users...
      </div>
    </div>

    <div id="forum-view">
      <div class="forum-header">
        <h2 class="forum-title">Forum Sections</h2>
      </div>
      
      <ul class="forum-sections" id="forum-sections">
      </ul>
    </div>

    <div id="section-view" style="display: none;">
      <button class="back-button" onclick="showForumSections()">← Back to Sections</button>
      
      <div class="forum-header">
        <h2 class="forum-title" id="section-title">Section</h2>
      </div>

      <button class="submit-post" onclick="toggleNewThreadForm()">New Thread</button>
      
      <div class="new-thread-form" id="new-thread-form">
        <input type="text" class="thread-title-input" id="thread-title" placeholder="Thread Title">
        <textarea class="post-textarea" id="thread-content" placeholder="Thread Content"></textarea>
        <button class="submit-post" onclick="createNewThread()">Create Thread</button>
      </div>

      <ul class="thread-list" id="thread-list"></ul>
    </div>

    <div id="thread-view" style="display: none;">
      <button class="back-button" id="thread-back-button">← Back to Threads</button>
      
      <div class="forum-header">
        <h2 class="forum-title" id="thread-title-header">Thread</h2>
      </div>

      <ul class="post-list" id="post-list">
        <!-- Posts will be populated here -->
      </ul>

      <div class="new-post-form">
        <textarea class="post-textarea" id="post-content" placeholder="What's on your mind?"></textarea>
        <button class="submit-post" id="submit-post">Post Reply</button>
      </div>
    </div>
  </div>

  <div class="footer">
    ©2007 OldGrounds Inc. | About | Contact | Terms of Use | Privacy Policy
  </div>
</div>

<script>
const room = new WebsimSocket();
let currentSection = '';
let currentThread = '';

function cleanupOldStates(states) {
  const ONE_MONTH = 30 * 24 * 60 * 60 * 1000; // 30 days in milliseconds
  const now = new Date().getTime();
  
  for (const sectionId in states.sections) {
    const date = new Date(states.sections[sectionId]).getTime();
    if (now - date > ONE_MONTH) {
      delete states.sections[sectionId];
    }
  }
  
  for (const threadId in states.threads) {
    const date = new Date(states.threads[threadId]).getTime();
    if (now - date > ONE_MONTH) {
      delete states.threads[threadId];
    }
  }
  
  return states;
}

function getSeenStates() {
  try {
    const seenStates = localStorage.getItem('oldgrounds-seen-states');
    if (!seenStates) {
      return {
        sections: {},
        threads: {}
      };
    }
    return cleanupOldStates(JSON.parse(seenStates));
  } catch (e) {
    console.warn('Error reading seen states:', e);
    return {
      sections: {},
      threads: {}
    };
  }
}

function saveSeenStates(states) {
  try {
    localStorage.setItem('oldgrounds-seen-states', JSON.stringify(states));
  } catch (e) {
    console.warn('Error saving seen states:', e);
    if (e.name === 'QuotaExceededError') {
      const cleanStates = cleanupOldStates(states);
      try {
        localStorage.setItem('oldgrounds-seen-states', JSON.stringify(cleanStates));
      } catch (retryError) {
        console.error('Failed to save even after cleanup:', retryError);
      }
    }
  }
}

function markSectionSeen(sectionId) {
  const states = getSeenStates();
  states.sections[sectionId] = new Date().toISOString();
  saveSeenStates(states);
}

function markThreadSeen(threadId) {
  const states = getSeenStates();
  states.threads[threadId] = new Date().toISOString();
  saveSeenStates(states);
}

function isSectionSeen(sectionId, lastPostDate) {
  const states = getSeenStates();
  const seenDate = states.sections[sectionId];
  return seenDate && new Date(seenDate) >= new Date(lastPostDate);
}

function isThreadSeen(threadId, lastPostDate) {
  const states = getSeenStates();
  const seenDate = states.threads[threadId];
  return seenDate && new Date(seenDate) >= new Date(lastPostDate);
}

function updateForumSections() {
  const sectionsData = {
    general: {
      title: "General Discussion",
      description: "Talk about anything and everything OldGrounds related"
    },
    games: {
      title: "Game Development",
      description: "Share and discuss your Flash games and game development"
    },
    art: {
      title: "Art & Animation",
      description: "Share your artwork and animations with the community"
    },
    help: {
      title: "Help & Support",
      description: "Get help with technical issues and site features"
    }
  };

  const sectionsList = document.getElementById('forum-sections');
  sectionsList.innerHTML = Object.entries(sectionsData).map(([id, data]) => {
    const lastPost = document.getElementById(`${id}-lastpost`)?.textContent || 'Never';
    const seen = isSectionSeen(id, lastPost);
    return `
      <li class="forum-section ${seen ? 'seen' : ''}" onclick="showSection('${id}')">
        <div class="section-header">
          <div class="section-icon">
            <img src="/a/39d37899-d576-447a-9bfb-187f44df039c" alt="Forum section icon" width="32" height="32">
          </div>
          <div class="section-content">
            <div class="section-title">${data.title}</div>
            <div class="section-description">${data.description}</div>
            <div class="section-stats">
              <span>Topics: <span id="${id}-count">0</span></span>
              <span>Replies: <span id="${id}-replies">0</span></span>
              <span>Last Post: <span id="${id}-lastpost">Never</span></span>
            </div>
          </div>
        </div>
      </li>
    `;
  }).join('');
}

function showSection(sectionId) {
  currentSection = sectionId;
  markSectionSeen(sectionId);
  document.getElementById('forum-view').style.display = 'none';
  document.getElementById('section-view').style.display = 'block';
  document.getElementById('thread-view').style.display = 'none';
  document.getElementById('section-title').textContent = getSectionTitle(sectionId);
  loadThreads(sectionId);
}

function showForumSections() {
  currentSection = '';
  document.getElementById('forum-view').style.display = 'block';
  document.getElementById('section-view').style.display = 'none';
  document.getElementById('thread-view').style.display = 'none';
  updateThreadCounts();
}

function showThread(threadId) {
  currentThread = threadId;
  markThreadSeen(threadId);
  document.getElementById('forum-view').style.display = 'none';
  document.getElementById('section-view').style.display = 'none';
  document.getElementById('thread-view').style.display = 'block';
  loadThreadPosts(threadId);
}

function getSectionTitle(sectionId) {
  const titles = {
    'general': 'General Discussion',
    'games': 'Game Development',
    'art': 'Art & Animation',
    'help': 'Help & Support'
  };
  return titles[sectionId] || 'Unknown Section';
}

function toggleNewThreadForm() {
  const form = document.getElementById('new-thread-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function createNewThread() {
  const title = document.getElementById('thread-title').value.trim();
  const content = document.getElementById('thread-content').value.trim();
  
  if (!title || !content) return;

  const threadId = `${currentSection}-${Date.now()}`;
  const threadData = {
    id: threadId,
    title: title,
    section: currentSection,
    author: room.party.client.username,
    avatarUrl: room.party.client.avatarUrl,
    timestamp: new Date().toLocaleString(),
    lastPost: new Date().toLocaleString()
  };

  await room.store.update({
    id: `threads-${currentSection}`,
    dependencies: { threadData },
    updateFunction: (threads = []) => [...threads, threadData]
  });

  const postData = {
    type: 'thread-post',
    threadId: threadId,
    content: content,
    username: room.party.client.username,
    avatarUrl: room.party.client.avatarUrl,
    timestamp: new Date().toLocaleString()
  };

  await savePost(postData);

  document.getElementById('thread-title').value = '';
  document.getElementById('thread-content').value = '';
  toggleNewThreadForm();
  loadThreads(currentSection);
  updateThreadCounts();
}

async function loadThreads(sectionId) {
  const threadList = document.getElementById('thread-list');
  threadList.innerHTML = '';
  
  const threads = await room.store.get(`threads-${sectionId}`) || [];
  
  threads.sort((a, b) => new Date(b.lastPost) - new Date(a.lastPost));
  
  threads.forEach(thread => {
    const seen = isThreadSeen(thread.id, thread.lastPost);
    const threadElement = document.createElement('li');
    threadElement.className = `thread ${seen ? 'seen' : ''}`;
    threadElement.innerHTML = `
      <div class="thread-header">
        <div class="thread-icon">
          <img src="/a/39d37899-d576-447a-9bfb-187f44df039c" alt="Thread icon" width="24" height="24">
        </div>
        <div class="thread-content">
          <div class="thread-title" onclick="showThread('${thread.id}')">${thread.title}</div>
          <div class="thread-meta">
            by ${thread.author} | ${thread.timestamp}
          </div>
        </div>
      </div>
    `;
    threadList.appendChild(threadElement);
  });
}

async function updateThreadCounts() {
  const sections = ['general', 'games', 'art', 'help'];
  
  for (const section of sections) {
    const threads = await room.store.get(`threads-${section}`) || [];
    const threadCount = threads.length;
    
    let totalReplies = 0;
    let lastPostDate = null;
    
    for (const thread of threads) {
      const posts = await room.store.get(`posts-${thread.id}`) || [];
      totalReplies += posts.length;
      
      const threadLastPost = posts.length > 0 
        ? new Date(posts[posts.length - 1].timestamp)
        : new Date(thread.timestamp);
        
      if (!lastPostDate || threadLastPost > lastPostDate) {
        lastPostDate = threadLastPost;
      }
    }

    document.getElementById(`${section}-count`).textContent = threadCount;
    document.getElementById(`${section}-replies`).textContent = totalReplies;
    document.getElementById(`${section}-lastpost`).textContent = 
      lastPostDate ? lastPostDate.toLocaleDateString() : 'Never';
  }
}

async function loadThreadPosts(threadId) {
  const threads = await room.store.get(`threads-${currentSection}`) || [];
  const thread = threads.find(t => t.id === threadId);
  
  if (thread) {
    document.getElementById('thread-title-header').textContent = thread.title;
  }

  const posts = await room.store.get(`posts-${threadId}`) || [];
  const postList = document.getElementById('post-list');
  postList.innerHTML = '';
  
  posts.forEach(post => addPostToList(post));

  document.getElementById('thread-back-button').onclick = () => showSection(currentSection);
}

function addPostToList(post) {
  const postList = document.getElementById('post-list');
  const postElement = document.createElement('li');
  postElement.className = 'forum-post';
  postElement.innerHTML = `
    <div class="post-header">
      <div class="post-avatar">
        <img src="${post.avatarUrl}" alt="User avatar" width="50" height="50">
      </div>
      <div class="post-info">
        <div class="post-author">${post.username}</div>
        <div class="post-date">${post.timestamp}</div>
      </div>
    </div>
    <div class="post-content">${post.content}</div>
  `;
  postList.appendChild(postElement);
}

document.getElementById('submit-post').addEventListener('click', async () => {
  const content = document.getElementById('post-content').value.trim();
  if (!content || !currentThread) return;
  
  const postData = {
    type: 'thread-post',
    threadId: currentThread,
    content: content,
    username: room.party.client.username,
    avatarUrl: room.party.client.avatarUrl,
    timestamp: new Date().toLocaleString()
  };
  
  await room.store.update({
    id: `threads-${currentSection}`,
    dependencies: { currentThread },
    updateFunction: (threads = []) => {
      return threads.map(thread => {
        if (thread.id === currentThread) {
          return { ...thread, lastPost: new Date().toLocaleString() };
        }
        return thread;
      });
    }
  });

  room.send(postData);
  document.getElementById('post-content').value = '';
});

async function savePost(postData) {
  await room.store.update({
    id: `posts-${postData.threadId}`,
    dependencies: { postData },
    updateFunction: (posts = []) => [...posts, postData]
  });
}

function startOnlineUsersInterval() {
  updateOnlineUsers();
  setInterval(updateOnlineUsers, 15000);
}

function updateOnlineUsers() {
  const usersList = document.getElementById('online-users-list');
  if (!usersList) return;

  const users = room.party?.peers || {};
  const onlineCount = Object.keys(users).length;
  
  usersList.innerHTML = onlineCount === 0 ? 
    '<span class="user-tag">No users online</span>' : 
    Object.entries(users)
      .map(([clientId, peer]) => `
        <span class="user-tag">
          <img src="${peer.avatarUrl}" alt="User avatar" class="user-avatar" width="16" height="16">
          ${peer.username}
        </span>
      `).join(' ');
}

room.onmessage = (event) => {
  const data = event.data;
  if (data.type === "thread-post" && data.threadId === currentThread) {
    addPostToList(data);
  }
};

document.addEventListener('DOMContentLoaded', () => {
  updateForumSections();
  showForumSections();
  startOnlineUsersInterval();
});
</script>
