<script>
const room = new WebsimSocket();
let currentSection = '';
let currentThread = '';

function cleanupOldStates(states) {
  const ONE_WEEK = 7 * 24 * 60 * 60 * 1000; 
  const now = new Date().getTime();
  
  let cleanStates = JSON.parse(JSON.stringify(states));

  for (const sectionId in cleanStates.sections) {
    const date = new Date(cleanStates.sections[sectionId]).getTime();
    if (now - date > ONE_WEEK) {
      delete cleanStates.sections[sectionId];
    }
  }
  
  for (const threadId in cleanStates.threads) {
    const date = new Date(cleanStates.threads[threadId]).getTime();
    if (now - date > ONE_WEEK) {
      delete cleanStates.threads[threadId];
    }
  }

  while (JSON.stringify(cleanStates).length > 4500000) {
    let oldestTime = Infinity;
    let oldestKey = null;
    let oldestType = null;

    for (const [type, items] of Object.entries(cleanStates)) {
      for (const [key, timestamp] of Object.entries(items)) {
        const date = new Date(timestamp).getTime();
        if (date < oldestTime) {
          oldestTime = date;
          oldestKey = key;
          oldestType = type;
        }
      }
    }

    if (oldestKey && oldestType) {
      delete cleanStates[oldestType][oldestKey];
    } else {
      break;
    }
  }
  
  return cleanStates;
}

function getSeenStates() {
  try {
    const seenStates = localStorage.getItem('oldgrounds-seen-states');
    if (!seenStates) {
      return {
        sections: {},
        threads: {}
      };
    }
    return cleanupOldStates(JSON.parse(seenStates));
  } catch (e) {
    console.warn('Error reading seen states:', e);
    return {
      sections: {},
      threads: {}
    };
  }
}

function saveSeenStates(states) {
  try {
    localStorage.setItem('oldgrounds-seen-states', JSON.stringify(states));
  } catch (e) {
    console.warn('Error saving seen states:', e);
    if (e.name === 'QuotaExceededError') {
      const cleanStates = cleanupOldStates(states);
      try {
        localStorage.setItem('oldgrounds-seen-states', JSON.stringify(cleanStates));
      } catch (retryError) {
        console.error('Failed to save even after cleanup:', retryError);
      }
    }
  }
}

function markSectionSeen(sectionId) {
  const states = getSeenStates();
  states.sections[sectionId] = new Date().toISOString();
  saveSeenStates(states);
}

function markThreadSeen(threadId) {
  const states = getSeenStates();
  states.threads[threadId] = new Date().toISOString();
  saveSeenStates(states);
}

function isSectionSeen(sectionId, lastPostDate) {
  const states = getSeenStates();
  const seenDate = states.sections[sectionId];
  return seenDate && new Date(seenDate) >= new Date(lastPostDate);
}

function isThreadSeen(threadId, lastPostDate) {
  const states = getSeenStates();
  const seenDate = states.threads[threadId];
  return seenDate && new Date(seenDate) >= new Date(lastPostDate);
}

function formatPostContent(content) {
  content = content.replace(
    /(https:\/\/websim\.ai\/[^\s<]+[^<.,:;"')\]\s])/g,
    (match) => `
      <div class="websim-embed">
        <a href="${match}" target="_blank" rel="noopener noreferrer">${match}</a>
        <button class="embed-toggle" onclick="toggleEmbed(this)">Show Embed</button>
        <iframe src="${match}" style="display:none;width:100%;height:600px;border:0;" loading="lazy"></iframe>
      </div>
    `
  );
  
  content = content.replace(
    /(https?:\/\/(?!websim\.ai)[^\s<]+[^<.,:;"')\]\s])/g, 
    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
  );
  
  content = content.replace(
    /!image\((https?:\/\/[^\s<]+\.(?:jpg|jpeg|gif|png))\)/gi,
    '<img src="$1" alt="User posted image" style="max-width:100%;height:auto;">'
  );
  
  content = content
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/^> (.+)/gm, '<blockquote>$1</blockquote>')
    .replace(/^### (.+)/gm, '<h4>$1</h4>')
    .replace(/^## (.+)/gm, '<h3>$1</h3>')
    .replace(/^# (.+)/gm, '<h2>$1</h2>');

  return content;
}

function toggleEmbed(button) {
  const iframe = button.nextElementSibling;
  if (iframe.style.display === 'none') {
    iframe.style.display = 'block';
    button.textContent = 'Hide Embed';
  } else {
    iframe.style.display = 'none';
    button.textContent = 'Show Embed';
  }
}

function updateForumSections() {
  const sectionsData = {
    general: {
      title: "General Discussion",
      description: "Talk about anything and everything OldGrounds related"
    },
    games: {
      title: "Game Development",
      description: "Share and discuss your Flash games and game development"
    },
    art: {
      title: "Art & Animation",
      description: "Share your artwork and animations with the community"
    },
    help: {
      title: "Help & Support",
      description: "Get help with technical issues and site features"
    }
  };

  const sectionsList = document.getElementById('forum-sections');
  sectionsList.innerHTML = Object.entries(sectionsData).map(([id, data]) => {
    const lastPost = document.getElementById(`${id}-lastpost`)?.textContent || 'Never';
    const seen = isSectionSeen(id, lastPost);
    return `
      <li class="forum-section ${seen ? 'seen' : ''}" onclick="showSection('${id}')">
        <div class="section-header">
          <div class="section-icon">
            <img src="/a/39d37899-d576-447a-9bfb-187f44df039c" alt="Forum section icon" width="32" height="32">
          </div>
          <div class="section-content">
            <div class="section-title">${data.title}</div>
            <div class="section-description">${data.description}</div>
            <div class="section-stats">
              <span>Topics: <span id="${id}-count">0</span></span>
              <span>Replies: <span id="${id}-replies">0</span></span>
              <span>Last Post: <span id="${id}-lastpost">Never</span></span>
            </div>
          </div>
        </div>
      </li>
    `;
  }).join('');
}

function showSection(sectionId) {
  currentSection = sectionId;
  markSectionSeen(sectionId);
  document.getElementById('forum-view').style.display = 'none';
  document.getElementById('section-view').style.display = 'block';
  document.getElementById('thread-view').style.display = 'none';
  document.getElementById('section-title').textContent = getSectionTitle(sectionId);
  loadThreads(sectionId);
}

function showForumSections() {
  currentSection = '';
  document.getElementById('forum-view').style.display = 'block';
  document.getElementById('section-view').style.display = 'none';
  document.getElementById('thread-view').style.display = 'none';
  updateThreadCounts();
}

function showThread(threadId) {
  currentThread = threadId;
  markThreadSeen(threadId);
  document.getElementById('forum-view').style.display = 'none';
  document.getElementById('section-view').style.display = 'none';
  document.getElementById('thread-view').style.display = 'block';
  loadThreadPosts(threadId);
}

function getSectionTitle(sectionId) {
  const titles = {
    'general': 'General Discussion',
    'games': 'Game Development',
    'art': 'Art & Animation',
    'help': 'Help & Support'
  };
  return titles[sectionId] || 'Unknown Section';
}

function toggleNewThreadForm() {
  const form = document.getElementById('new-thread-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function createNewThread() {
  const title = document.getElementById('thread-title').value.trim();
  const content = document.getElementById('thread-content').value.trim();
  
  if (!title || !content) return;

  const threadId = `${currentSection}-${Date.now()}`;
  const threadData = {
    id: threadId,
    title: title,
    section: currentSection,
    author: room.party.client.username,
    avatarUrl: room.party.client.avatarUrl,
    timestamp: new Date().toLocaleString(),
    lastPost: new Date().toLocaleString()
  };

  await room.store.update({
    id: `threads-${currentSection}`,
    dependencies: { threadData },
    updateFunction: (threads = []) => [...threads, threadData]
  });

  const postData = {
    type: 'thread-post',
    threadId: threadId,
    content: content,
    username: room.party.client.username,
    avatarUrl: room.party.client.avatarUrl,
    timestamp: new Date().toLocaleString()
  };

  await savePost(postData);

  document.getElementById('thread-title').value = '';
  document.getElementById('thread-content').value = '';
  toggleNewThreadForm();
  loadThreads(currentSection);
  updateThreadCounts();
}

async function loadThreads(sectionId) {
  const threadList = document.getElementById('thread-list');
  threadList.innerHTML = '';
  
  const threads = await room.store.get(`threads-${sectionId}`) || [];
  
  threads.sort((a, b) => new Date(b.lastPost) - new Date(a.lastPost));
  
  threads.forEach(thread => {
    const seen = isThreadSeen(thread.id, thread.lastPost);
    const threadElement = document.createElement('li');
    threadElement.className = `thread ${seen ? 'seen' : ''}`;
    threadElement.innerHTML = `
      <div class="thread-header">
        <div class="thread-icon">
          <img src="/a/39d37899-d576-447a-9bfb-187f44df039c" alt="Thread icon" width="24" height="24">
        </div>
        <div class="thread-content">
          <div class="thread-title" onclick="showThread('${thread.id}')">${thread.title}</div>
          <div class="thread-meta">
            by ${thread.author} | ${thread.timestamp}
          </div>
        </div>
      </div>
    `;
    threadList.appendChild(threadElement);
  });
}

async function updateThreadCounts() {
  const sections = ['general', 'games', 'art', 'help'];
  
  for (const section of sections) {
    let threads = await room.store.get(`threads-${section}`);
    if (!Array.isArray(threads)) threads = [];
    
    const threadCount = threads.length;
    
    let totalReplies = 0;
    let lastPostDate = null;
    
    for (const thread of threads) {
      if (!thread || !thread.id) continue;

      let posts = await room.store.get(`posts-${thread.id}`);
      if (!Array.isArray(posts)) posts = [];
      
      totalReplies += posts.length;
      
      const lastPostTimestamp = posts.length > 0 && posts[posts.length - 1]
        ? posts[posts.length - 1].timestamp 
        : thread.timestamp;
        
      const threadLastPost = new Date(lastPostTimestamp);
        
      if (!isNaN(threadLastPost.getTime())) {
        if (!lastPostDate || threadLastPost > lastPostDate) {
          lastPostDate = threadLastPost;
        }
      }
    }

    const countEl = document.getElementById(`${section}-count`);
    const repliesEl = document.getElementById(`${section}-replies`);
    const lastPostEl = document.getElementById(`${section}-lastpost`);

    if (countEl) countEl.textContent = threadCount;
    if (repliesEl) repliesEl.textContent = totalReplies;
    if (lastPostEl) lastPostEl.textContent = 
      lastPostDate ? lastPostDate.toLocaleDateString() : 'Never';
  }
}

async function loadThreadPosts(threadId) {
  const threads = await room.store.get(`threads-${currentSection}`) || [];
  const thread = threads.find(t => t.id === threadId);
  
  if (thread) {
    document.getElementById('thread-title-header').textContent = thread.title;
  }

  const posts = await room.store.get(`posts-${threadId}`) || [];
  const postList = document.getElementById('post-list');
  postList.innerHTML = '';
  
  posts.forEach(post => addPostToList(post));

  document.getElementById('thread-back-button').onclick = () => showSection(currentSection);
}

function addPostToList(post) {
  const postList = document.getElementById('post-list');
  const postElement = document.createElement('li');
  postElement.className = 'forum-post';
  
  const isCurrentUser = post.username === room.party.client.username;
  const postControls = isCurrentUser ? `
    <div class="post-controls">
      <button class="post-edit-btn" onclick="editPost('${post.threadId}', '${post.timestamp}')">Edit</button>
      <button class="post-delete-btn" onclick="deletePost('${post.threadId}', '${post.timestamp}')">Delete</button>
    </div>
  ` : '';

  postElement.innerHTML = `
    <div class="post-header">
      <div class="post-avatar">
        <img src="${post.avatarUrl}" alt="User avatar" width="50" height="50">
      </div>
      <div class="post-info">
        <div class="post-author">${post.username}</div>
        <div class="post-date">${post.timestamp}</div>
      </div>
      ${postControls}
    </div>
    <div class="post-content" id="post-content-${post.timestamp}">${formatPostContent(post.content)}</div>
  `;
  postList.appendChild(postElement);
}

async function editPost(threadId, timestamp) {
  const contentDiv = document.getElementById(`post-content-${timestamp}`);
  const posts = await room.store.get(`posts-${threadId}`);
  const post = posts.find(p => p.timestamp === timestamp);
  if (!post || !contentDiv) return;

  const originalContent = post.content;
  contentDiv.innerHTML = `
    <div class="new-post-form">
      <div class="formatting-toolbar">
        <button class="format-btn" onclick="insertFormatEdit('**', '**', '${timestamp.replace(/'/g, "\\'")}')">Bold</button>
        <button class="format-btn" onclick="insertFormatEdit('*', '*', '${timestamp.replace(/'/g, "\\'")}')">Italic</button>
        <button class="format-btn" onclick="insertFormatEdit('\`', '\`', '${timestamp.replace(/'/g, "\\'")}')">Code</button>
        <button class="format-btn" onclick="insertFormatEdit('> ', '', '${timestamp.replace(/'/g, "\\'")}')">Quote</button>
        <button class="format-btn" onclick="insertFormatEdit('# ', '', '${timestamp.replace(/'/g, "\\'")}')">H1</button>
        <button class="format-btn" onclick="insertFormatEdit('## ', '', '${timestamp.replace(/'/g, "\\'")}')">H2</button>
        <button class="format-btn" onclick="insertFormatEdit('### ', '', '${timestamp.replace(/'/g, "\\'")}')">H3</button>
        <button class="format-btn" onclick="insertFormatEdit('!image(', ')', '${timestamp.replace(/'/g, "\\'")}')">Image</button>
      </div>
      <textarea class="post-textarea" id="edit-textarea-${timestamp}">${originalContent.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
      <button class="submit-post" onclick="saveEdit('${threadId.replace(/'/g, "\\'")}', '${timestamp.replace(/'/g, "\\'")}')">Save</button>
      <button class="post-delete-btn" onclick="cancelEdit('${threadId.replace(/'/g, "\\'")}', '${timestamp.replace(/'/g, "\\'")}')">Cancel</button>
    </div>
  `;
}

function insertFormatEdit(prefix, suffix, timestamp) {
  const textarea = document.getElementById(`edit-textarea-${timestamp}`);
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const text = textarea.value;
  
  const selectedText = text.substring(start, end);
  const newText = text.substring(0, start) + prefix + selectedText + suffix + text.substring(end);
  
  textarea.value = newText;
  textarea.focus();
  textarea.selectionStart = start + prefix.length;
  textarea.selectionEnd = end + prefix.length;
}

async function saveEdit(threadId, timestamp) {
  const content = document.getElementById(`edit-textarea-${timestamp}`).value.trim();
  if (!content) return;

  await room.store.update({
    id: `posts-${threadId}`,
    dependencies: { timestamp, content },
    updateFunction: (posts = []) => {
      return posts.map(p => {
        if (p.timestamp === timestamp) {
          return { ...p, content, edited: true };
        }
        return p;
      });
    }
  });
  
  loadThreadPosts(threadId);
}

async function cancelEdit(threadId, timestamp) {
  const posts = await room.store.get(`posts-${threadId}`);
  const post = posts.find(p => p.timestamp === timestamp);
  if (!post) return;
  
  const contentDiv = document.getElementById(`post-content-${timestamp}`);
  contentDiv.innerHTML = formatPostContent(post.content);
}

async function deletePost(threadId, timestamp) {
  if (!confirm('Are you sure you want to delete this post?')) return;

  await room.store.update({
    id: `posts-${threadId}`,
    dependencies: { timestamp },
    updateFunction: (posts = []) => posts.filter(p => p.timestamp !== timestamp)
  });
  
  loadThreadPosts(threadId);
}

document.getElementById('submit-post').addEventListener('click', async () => {
  const content = document.getElementById('post-content').value.trim();
  if (!content) return;

  const postData = {
    type: 'thread-post',
    threadId: currentThread,
    content: content,
    username: room.party.client.username,
    avatarUrl: room.party.client.avatarUrl,
    timestamp: new Date().toLocaleString()
  };

  await savePost(postData);
  
  await room.store.update({
    id: `threads-${currentSection}`,
    dependencies: { threadId: currentThread },
    updateFunction: (threads = [], deps) => {
      const targetId = deps && deps.threadId ? deps.threadId : null;
      if (!targetId) return threads;
      
      return threads.map(t => {
        if (t.id === targetId) {
          return { ...t, lastPost: new Date().toLocaleString() };
        }
        return t;
      });
    }
  });

  document.getElementById('post-content').value = '';
  loadThreadPosts(currentThread);
});

function startOnlineUsersInterval() {
  updateOnlineUsers();
  setInterval(updateOnlineUsers, 15000);
}

function updateOnlineUsers() {
  const usersList = document.getElementById('online-users-list');
  if (!usersList) return;

  const users = room.party?.peers || {};
  const uniqueUsers = Object.values(users).filter((user, index, self) =>
    index === self.findIndex(u => u.username === user.username)
  );
  
  const onlineCount = uniqueUsers.length;
  
  usersList.innerHTML = onlineCount === 0 ? 
    '<span class="user-tag">No users online</span>' : 
    uniqueUsers.map(peer => `
      <span class="user-tag">
        <img src="${peer.avatarUrl}" alt="User avatar" class="user-avatar" width="16" height="16">
        ${peer.username}
      </span>
    `).join(' ');
}

room.onmessage = async (event) => {
  const data = event.data;
  if (data.type === "thread-post" && data.threadId === currentThread) {
    await savePost(data);
    addPostToList(data);
    updateThreadCounts();
  }
};

async function savePost(postData) {
  await room.store.update({
    id: `posts-${postData.threadId}`,
    dependencies: { postData },
    updateFunction: (posts = []) => [...posts, postData]
  });
}

document.addEventListener('DOMContentLoaded', () => {
  updateForumSections();
  showForumSections();
  startOnlineUsersInterval();
});
</script>
